<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Os Studio AI Flow 4321</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:420px;min-height:500px;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0f0f10;color:#e2e8f0}
.header{padding:16px;background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:2px solid #00c73c;text-align:center}
.header h1{font-size:16px;color:#00c73c;margin-bottom:4px}
.header p{font-size:11px;color:#666}
.status{display:flex;gap:8px;justify-content:center;margin-top:8px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.on{background:#00c73c;box-shadow:0 0 6px #00c73c}.status-dot.off{background:#666}
.status span{font-size:11px;color:#aaa}

.tabs{display:flex;border-bottom:1px solid #333;background:#1a1a1b}
.tabs button{flex:1;padding:12px 8px;background:transparent;border:none;color:#888;font-size:13px;font-weight:bold;cursor:pointer;border-bottom:2px solid transparent;transition:0.2s}
.tabs button:hover{color:#fff;background:#27272a}
.tabs button.active{color:#00c73c;border-bottom-color:#00c73c;background:#27272a}

.tab-content{display:none;padding:16px}
.tab-content.active{display:block}

.section-label{font-size:12px;color:#00c73c;font-weight:bold;margin-bottom:8px;display:block}
textarea{width:100%;height:120px;background:#1e1e1e;border:1px solid #333;border-radius:6px;color:#e2e8f0;padding:10px;font-size:12px;font-family:monospace;resize:vertical;outline:none}
textarea:focus{border-color:#00c73c}
textarea::placeholder{color:#555}

.prompt-count{text-align:right;font-size:11px;color:#666;margin-top:4px}

.btn-group{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.btn{padding:12px;border:none;border-radius:6px;font-weight:bold;font-size:13px;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{transform:scale(1.02)}
.btn-primary{background:#00c73c;color:#fff}.btn-primary:hover{background:#00b336}
.btn-fetch{background:#3b82f6;color:#fff}.btn-fetch:hover{background:#2563eb}
.btn-factory{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}.btn-factory:hover{opacity:0.9}
.btn-open{background:#27272a;color:#ccc;border:1px solid #444;font-size:12px;padding:8px}.btn-open:hover{background:#333}

.quick-links{padding:12px 16px;display:flex;gap:6px;flex-wrap:wrap}
.quick-link{padding:6px 10px;background:#27272a;border:1px solid #333;border-radius:4px;color:#aaa;font-size:11px;cursor:pointer;text-decoration:none;transition:0.2s}
.quick-link:hover{background:#333;color:#fff;border-color:#00c73c}

.log{padding:12px 16px}
.log-area{background:#0a0a0a;border:1px solid #222;border-radius:6px;padding:10px;height:80px;overflow-y:auto;font-family:monospace;font-size:11px;color:#666}
.log-area .ok{color:#00c73c}.log-area .err{color:#ff4d4d}.log-area .info{color:#3b82f6}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Os Studio AI Flow 4321</h1>
  <p>멀티 플랫폼 통합 공장 시스템</p>
  <div class="status">
    <span><span class="status-dot on" id="dot-dashboard"></span> Dash</span>
    <span><span class="status-dot off" id="dot-imagen"></span> Imagen</span>
    <span><span class="status-dot off" id="dot-luma"></span> Luma</span>
    <span><span class="status-dot off" id="dot-suno"></span> Suno</span>
    <span><span class="status-dot off" id="dot-eleven"></span> Eleven</span>
  </div>
</div>

<div class="tabs">
  <button class="active" data-tab="image">📷 Imagen</button>
  <button data-tab="video">🎬 Luma</button>
  <button data-tab="audio">🎵 Suno</button>
  <button data-tab="tts">🗣️ Eleven</button>
</div>

<div class="tab-content active" id="tab-image">
  <span class="section-label">이미지 발주서 (Google Labs FX)</span>
  <textarea id="prompt-image" placeholder="이미지 프롬프트를 입력하세요...&#10;줄바꿈으로 여러 장 생성 가능&#10;예: Cinematic photo of sunset over Seoul skyline, 8k"></textarea>
  <div class="prompt-count"><span id="count-image">0</span>장 대기</div>
</div>

<div class="tab-content" id="tab-video">
  <span class="section-label">영상 발주서 (Luma Dream Machine)</span>
  <textarea id="prompt-video" placeholder="영상 프롬프트 입력..."></textarea>
  <div class="prompt-count"><span id="count-video">0</span>편 대기</div>
</div>

<div class="tab-content" id="tab-audio">
  <span class="section-label">음악 발주서 (Suno AI)</span>
  <textarea id="prompt-audio" placeholder="음악 프롬프트 입력..."></textarea>
  <div class="prompt-count"><span id="count-audio">0</span>곡 대기</div>
</div>

<div class="tab-content" id="tab-tts">
  <span class="section-label">성우 발주서 (ElevenLabs)</span>
  <textarea id="prompt-tts" placeholder="음성 변환할 텍스트 입력..."></textarea>
  <div class="prompt-count"><span id="count-tts">0</span>건 대기</div>
</div>

<div class="btn-group">
  <button class="btn btn-fetch" id="btn-fetch">📡 대시보드에서 발주서 가져오기</button>
  <button class="btn btn-primary" id="btn-start">▶️ 현재 탭 공장 가동</button>
  <button class="btn btn-factory" id="btn-start-all">🚀 전 공장 동시 가동</button>
</div>

<div class="quick-links">
  <a class="quick-link" href="https://labs.google/fx/tools/image-fx" target="_blank">Labs FX</a>
  <a class="quick-link" href="https://lumalabs.ai/dream-machine" target="_blank">Luma</a>
  <a class="quick-link" href="https://suno.com/create" target="_blank">Suno</a>
  <a class="quick-link" href="https://elevenlabs.io" target="_blank">ElevenLabs</a>
  <a class="quick-link" href="http://127.0.0.1:5000" target="_blank">대시보드</a>
</div>

<div class="log">
  <span class="section-label" style="color:#666">공장 로그</span>
  <div class="log-area" id="log-area">
    <div class="info">[시스템] AI Flow 4321 대기 중...</div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
