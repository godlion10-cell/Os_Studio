<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🚀 오스(Os) 컨트롤 타워 v3.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap');
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #2c3e50; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .btn { background-color: #03c75a; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn:hover { background-color: #02b350; }
        .btn-copy { background-color: #2980b9; font-size: 15px; padding: 13px; }
        .btn-copy:hover { background-color: #2471a3; }
        input[type="text"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; }
        .trend-category { margin-top: 15px; font-weight: bold; color: #e74c3c; font-size: 14px; }
        .trend-item { padding: 8px; background: #f8f9fa; margin-bottom: 5px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px;}
        .trend-item:hover { background: #e9ecef; }

        /* ✨ 네이버 블로그 실규격 클론 에디터 */
        .editor-wrapper { background-color: #f4f4f4; padding: 20px; border-radius: 8px; margin-bottom: 12px; }
        #naver-editor-body {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 50px 30px;
            background-color: #ffffff;
            min-height: 600px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            font-family: 'Nanum Gothic', sans-serif;
            text-align: center;
            line-height: 2.2;
            color: #333;
            outline: none;
            word-break: keep-all;
            font-size: 16px;
        }
        #naver-editor-body img {
            max-width: 100%;
            height: auto;
            margin: 30px auto;
            border-radius: 8px;
            display: block;
        }
        .editor-title-area {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            color: #1a1a1a;
        }
        .editor-placeholder { text-align: center; color: #aaa; margin-top: 150px; font-size: 15px; }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: #2c3e50;">🚀 오스(Os) 통합 콘텐츠 공장 v3.0</h1>
    <div class="container">
        <div class="panel">
            <h2>🔥 AI 실시간 트렌드 레이더</h2>
            <div id="trends-container"><p style="color: #888;">로딩 중...</p></div>
            <button class="btn" style="background-color: #6c757d;" onclick="loadTrends()">🔄 트렌드 새로고침</button>
        </div>
        
        <div class="panel">
            <h2>🎯 통합 원고 & 썸네일 자동화</h2>
            <input type="text" id="keyword-input" placeholder="키워드를 입력하세요 (예: 봄철 피부 관리법)">
            <button class="btn" style="background-color: #8e44ad; font-size: 16px; padding: 15px;" onclick="generateAll()">✨ 블로그 원고 + 고화질 썸네일 동시 생성</button>
            
            <h2 style="margin-top: 30px;">🎨 네이버 클론 에디터 <small style="font-size:12px; color:#888; font-weight:normal;">(700px 실규격)</small></h2>
            <div class="editor-wrapper">
                <div id="naver-editor-body" contenteditable="true">
                    <div class="editor-placeholder">✨ 원고를 생성하면 이곳에<br>네이버 블로그 실규격으로 렌더링됩니다.</div>
                </div>
            </div>
            <button class="btn btn-copy" onclick="copyRichText()">📋 네이버 서식 그대로 복사하기</button>
        </div>
        
        <div class="panel" style="grid-column: 1 / -1;">
            <h2>🎥 추출된 썸네일 실사 이미지 갤러리</h2>
            <div id="storyboard-box" style="border: 1px dashed #ccc; padding: 20px; min-height: 250px; background: #fff; border-radius: 8px;">
                <p style="text-align: center; color: #888; margin-top: 100px;">원고 내용에 찰떡같이 맞는 고화질 실사 이미지가 이곳에 렌더링됩니다.</p>
            </div>
        </div>
    </div>

    <script>
        window.onload = loadTrends;
        
        async function loadTrends() {
            const container = document.getElementById('trends-container');
            container.innerHTML = '<p style="color: #888;">⏳ 제미나이가 실시간 트렌드를 분석 중입니다...</p>';
            try {
                const res = await fetch('/api/trends');
                const data = await res.json();
                
                let html = '<div class="trend-category">🔍 검색 노출 추천 (Search)</div>';
                data.search_trends.forEach((kw, i) => {
                    html += `<div class="trend-item" onclick="document.getElementById('keyword-input').value='${kw}'"><span><strong>${i+1}.</strong> ${kw}</span><span style="font-size:11px; color:#03c75a;">선택 👆</span></div>`;
                });
                
                html += '<div class="trend-category" style="color: #3498db; margin-top: 20px;">🏠 홈판 이슈 추천 (Home)</div>';
                data.home_trends.forEach((kw, i) => {
                    html += `<div class="trend-item" onclick="document.getElementById('keyword-input').value='${kw}'"><span><strong>${i+1}.</strong> ${kw}</span><span style="font-size:11px; color:#03c75a;">선택 👆</span></div>`;
                });
                
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<p style="color:red;">트렌드 로딩 실패</p>';
            }
        }

        async function generateAll() {
            const kw = document.getElementById('keyword-input').value;
            if(!kw) return alert('키워드를 입력해주세요!');
            
            const editor = document.getElementById('naver-editor-body');
            const imgBox = document.getElementById('storyboard-box');
            
            editor.innerHTML = '<div class="editor-placeholder">⏳ <strong>AI 수석 작가</strong>가 원고를 집필 중입니다...<br><small style="color:#aaa;">(약 20~40초 소요)</small></div>';
            imgBox.innerHTML = '<p style="text-align:center; color:#888; margin-top:60px;">원고 생성 완료 후 이미지가 여기에 표시됩니다.</p>';
            
            try {
                const res = await fetch('/api/generate-full', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ keyword: kw }) 
                });
                const response = await res.json();
                
                if (response.status === 'success') {
                    // 네이버 클론 에디터에 원고 렌더링
                    editor.innerHTML = `<div class="editor-title-area">📝 ${response.title}</div>${response.html}`;
                    
                    imgBox.innerHTML = `<div style="padding: 20px; text-align: center; background: #f0faf5; border-radius: 8px; border: 1px solid #03c75a;">
                        <h3 style="color: #03c75a;">✅ 원고 + 이미지 생성 완료!</h3>
                        <p style="color: #555;">이미지가 원고 내 삽입되었습니다.<br>📋 복사 버튼으로 네이버 블로그에 바로 붙여넣기 하세요!</p>
                    </div>`;
                } else {
                    editor.innerHTML = `<div style="color:red; text-align:center; margin-top:100px; padding:20px;">🚨 에러: ${response.message}</div>`;
                    imgBox.innerHTML = '';
                }
            } catch (err) {
                editor.innerHTML = `<div style="color:red; text-align:center; margin-top:100px;">통신 에러 발생: ${err.message}</div>`;
            }
        }

        async function copyRichText() {
            const editor = document.getElementById('naver-editor-body');
            if (editor.innerText.includes('원고를 생성하면 이곳에')) return alert('먼저 원고를 생성해주세요!');
            try {
                const html = editor.innerHTML;
                const blob = new Blob([html], { type: 'text/html' });
                const item = new ClipboardItem({ 'text/html': blob });
                await navigator.clipboard.write([item]);
                alert('✅ 복사 성공! 네이버 블로그 스마트에디터에서 Ctrl+V 를 누르세요.');
            } catch (err) { alert('복사 실패. 브라우저 설정을 확인해주세요.'); }
        }
    </script>
</body>
</html>
